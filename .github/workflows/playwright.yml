name: Playwright Tests

# Esto le dice a GitHub cuándo ejecutar las pruebas (al hacer push a la rama main)
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    # El sistema operativo virtual donde correrán los tests
    runs-on: ubuntu-latest

    steps:
    # 1. Descarga tu código en el servidor de GitHub
    - name: Checkout del código
      uses: actions/checkout@v4

    # 2. Instala Node.js
    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    # 3. Instala las dependencias de tu package.json
    - name: Instalar dependencias
      run: npm ci

    # 4. Instala los navegadores de Playwright (Chromium, Firefox, WebKit) y sus dependencias
    - name: Instalar navegadores de Playwright
      run: npx playwright install --with-deps

    # 5. Recreamos el archivo server.key de forma segura en el servidor virtual
    - name: Configurar llave privada de Salesforce
      run: |
        mkdir -p certs
        echo "${{ secrets.SERVER_KEY }}" > certs/server.key

    # 6. Ejecutamos las pruebas con TUS variables de entorno
    - name: Ejecutar pruebas de Playwright
      run: npx playwright test
      env:
        CONSUMER_SECRET: ${{ secrets.CONSUMER_SECRET }}
        CONSUMER_KEY: ${{ secrets.CONSUMER_KEY }}
        LOGIN_URL: ${{ secrets.LOGIN_URL }}
        USERNAME: ${{ secrets.USERNAME }}

    # 7. Guarda el reporte visual por si alguna prueba falla
    - name: Subir reporte de Playwright
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30